## This is a basic workflow to help you get started with Actions

name: Vercel deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

# Controls when the workflow will run
on:
  pull_request:
    branches:
      - main
      - develop
      - feature

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install vercel
        run: npm install --global vercel@latest

      - name: Deploy to vercel developement environment
        if: github.ref == 'refs/head/develop'
        run: |
          vercel pull --yes --environment=development --token=$VERCEL_TOKEN

          vercel build --token=$VERCEL_TOKEN

          vercel deploy --prebuilt --token=$VERCEL_TOKEN

      - name: Deploy to vercel preview environment
        if: github.ref == 'refs/head/uat'
        run: |
          vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

          vercel build --token=$VERCEL_TOKEN

          vercel deploy --prebuilt --token=$VERCEL_TOKEN

      - name: Deploy to vercel production environment
        if: github.ref == 'refs/head/main'
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN

          vercel build --token=$VERCEL_TOKEN

          vercel deploy --prebuilt --token=$VERCEL_TOKEN



        
          
